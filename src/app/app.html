<div>
  <form #studentForm="ngForm">
    <div class="form-group">
      <h3>Student Form</h3>
      {{studentForm.value | json}} <br>
      {{student | json}}
    </div>
    <div class="form-group">
      <label for="name">Name:</label>
      <input name="name" [(ngModel)]="student.name">
    </div>
    <div class="form-group">
      <label for="email">Email:</label>
      <input name="email" [ngModel]="student.email">
    </div>
    <div class="form-group">
      <label for="">Gender</label>
      <input type="radio" name="rdMale" value="male" [ngModel]="student.gender">
      <label for="">Male</label>
      <input type="radio" name="rdFemale" value="female" [ngModel]="student.gender">
      <label for="">Female</label>
    </div>
    <div class="form-group">
      <label>Major:</label>
      <select name="subject" [ngModel]="student.subject">
        <option *ngFor="let sub of subjects">{{sub}}</option>
      </select>
    </div>
    <div class="form-group">
      <button>submit</button>
    </div>
  </form>
</div>
